name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package Extension
        run: npx @vscode/vsce package --out onenote-mcp.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: onenote-mcp-vsix
          path: onenote-mcp.vsix

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write
    
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: onenote-mcp-vsix

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename VSIX with version
        run: mv onenote-mcp.vsix onenote-mcp-${{ steps.get_version.outputs.VERSION }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: OneNote MCP Server v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## OneNote MCP Server v${{ steps.get_version.outputs.VERSION }}
            
            ### 🚀 Quick Install
            
            **Option 1: One-Click Install (if published to Marketplace)**
            
            Click this link to install directly in VS Code:
            [Install OneNote MCP](vscode:extension/rashmirrout.onenote-mcp)
            
            **Option 2: Install from VSIX**
            
            1. Download `onenote-mcp-${{ steps.get_version.outputs.VERSION }}.vsix` below
            2. Open VS Code
            3. Press `Ctrl+Shift+P` (or `Cmd+Shift+P` on Mac)
            4. Type "Install from VSIX" and select the command
            5. Choose the downloaded `.vsix` file
            
            **Option 3: Command Line**
            
            ```bash
            code --install-extension onenote-mcp-${{ steps.get_version.outputs.VERSION }}.vsix
            ```
            
            ### 📋 Features
            
            - **search_notebooks** - Search OneNote notebooks by name
            - **get_notebook_sections** - List sections in a notebook
            - **get_section_pages** - List pages in a section
            - **read_page** - Read page content as Markdown
            - **search_onenote** - Global search across all pages
            - **create_page** - Create new pages with Markdown content
            - **update_page** - Append content to existing pages
            
            ### 🔐 Authentication
            
            Uses Microsoft Graph with public client authentication - no app registration required!
            Authentication happens automatically when you first use a tool.
            
          files: |
            onenote-mcp-${{ steps.get_version.outputs.VERSION }}.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
